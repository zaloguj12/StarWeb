name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # Pinned so vcpkg's ABI hashes stay stable across runs and the binary cache hits.
  # Bump deliberately; expect one slow rebuild afterwards.
  VCPKG_REF: '2026.06.24'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install glfw

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libglfw3-dev libgl1-mesa-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Checkout vcpkg (Windows)
        if: runner.os == 'Windows'
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_REF }}
          path: vcpkg

      - name: Cache vcpkg binary packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-x64-windows-${{ env.VCPKG_REF }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            vcpkg-x64-windows-${{ env.VCPKG_REF }}-

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
        run: |
          New-Item -ItemType Directory -Force -Path vcpkg_cache | Out-Null
          ./vcpkg/bootstrap-vcpkg.bat -disableMetrics
          ./vcpkg/vcpkg.exe install --triplet x64-windows `
            pkgconf glfw3 'ffmpeg[core,avcodec,avformat,swscale,swresample]'

      - name: Configure (macOS/Linux)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Stage binaries (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/stwp_server build/stwp_client build/stwp_browser dist/

      - name: Stage binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/Release/stwp_server.exe, build/Release/stwp_client.exe, build/Release/stwp_browser.exe dist/
          Copy-Item build/Release/*.dll dist/ -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: starweb-${{ matrix.name }}
          path: dist/
