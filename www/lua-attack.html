<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>StarWeb Lua Sandbox Attacks</title>
</head>

<body>
    <h1 id="verdict" style="color:#e0e0e0">Running sandbox attacks...</h1>
    <p style="color:#aaaaaa">Each line is a hostile action a page might attempt. All must be blocked.</p>
    <pre id="results" style="color:#dddddd"></pre>

    <script>
        local results = document.getElementById("results")
        local pass, fail = 0, 0
        local function check(name, blocked)
            if blocked then pass = pass + 1 else fail = fail + 1 end
            results.textContent = results.textContent ..
                (blocked and "[PASS] " or "[FAIL] ") .. name .. "\n"
            console.log(blocked and "PASS" or "FAIL", name)
        end

        check("os library absent",            os == nil)
        check("io library absent",            io == nil)
        check("package/require absent",       package == nil and require == nil)
        check("debug library absent",         debug == nil)
        check("load removed (no dynamic code)", load == nil)
        check("loadfile/dofile removed",      loadfile == nil and dofile == nil)
        check("string.dump removed (no bytecode)", string.dump == nil)
        check("collectgarbage removed",       collectgarbage == nil)

        check("infinite loop aborted by watchdog",
              not pcall(function() while true do end end))
        check("memory bomb denied by allocator",
              not pcall(function() local t = {}; for i = 1, 1e9 do t[i] = i end end))

        location.href = "http://evil.example/steal"

        local v = document.getElementById("verdict")
        if fail == 0 then
            v.textContent = "Sandbox held: " .. pass .. "/" .. pass .. " attacks blocked"
            v.style.color = "#4ade80"
        else
            v.textContent = "SANDBOX BREACH: " .. fail .. " attack(s) got through"
            v.style.color = "#f87171"
        end
    </script>
</body>

</html>
